<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroGab AI Model Builder</title>
  <style>
    :root {
      --bg: #0b0b16;
      --panel: #111123;
      --panel2: #17172d;
      --border: #29294a;
      --muted: #7f86ad;
      --text: #f5f6ff;
      --accent: #f5c400;
      --accentSoft: #ffe176;
      --accentBg: rgba(245,196,0,.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    .ng-app {
      max-width: 1420px;
      margin: 0 auto;
      padding: 0 28px 28px;
      background: var(--bg);
      color: var(--text);
    }

    .ng-topbar {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .ng-brand {
      font-weight: 900;
      font-size: 18px;
      background: linear-gradient(90deg,var(--accent),#fff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .ng-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
    }

    .ng-reset:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .ng-layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      min-height: 560px;
    }

    .ng-sidebar {
      border-right: 1px solid var(--border);
      padding: 14px 0;
    }

    .ng-step {
      height: 45px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      color: var(--muted);
      cursor: pointer;
      border-left: 4px solid transparent;
      user-select: none;
    }

    .ng-step.active {
      background: rgba(245,196,0,.08);
      border-left-color: var(--accent);
      color: var(--accent);
      font-weight: 900;
    }

    .ng-step.done {
      color: #b6bbdc;
    }

    .ng-num {
      min-width: 21px;
      height: 21px;
      border-radius: 50%;
      background: #2d315a;
      color: #d8ddff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
    }

    .ng-step.active .ng-num,
    .ng-step.done .ng-num {
      background: var(--accent);
      color: #080808;
    }

    .ng-content {
      padding: 22px 24px 170px;
      min-height: 560px;
    }

    .ng-content h2 {
      margin: 0 0 10px;
      font-size: 21px;
      color: #fff;
    }

    .ng-subtitle {
      color: var(--muted);
      margin-bottom: 22px;
      font-size: 15px;
    }

    .ng-group {
      margin-bottom: 20px;
    }

    .ng-group-title {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .ng-options {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .ng-option {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 12px 18px;
      min-height: 42px;
      font-size: 15px;
      cursor: pointer;
      transition: .15s ease;
    }

    .ng-option:hover {
      border-color: rgba(245,196,0,.6);
      color: var(--accentSoft);
    }

    .ng-option.selected {
      border-color: var(--accent);
      background: var(--accentBg);
      color: var(--accent);
      font-weight: 900;
    }

    .ng-prompt-wrap {
  position: relative;
  z-index: 20;
  margin-top: 30px;
}

    .ng-prompt-box {
      background: #17172d;
      border: 1px solid var(--border);
      min-height: 155px;
      padding: 16px 20px 26px;
      box-shadow: 0 -20px 40px rgba(0,0,0,.22);
      cursor: pointer;
    }

    .ng-prompt-head {
      display: flex;
      justify-content: space-between;
      color: var(--accent);
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .ng-count {
      color: var(--muted);
      font-weight: 400;
      text-transform: none;
      font-size: 12px;
    }

    .ng-prompt-text {
      line-height: 1.55;
      font-size: 15px;
      color: #f7f7ff;
    }

    .ng-insert {
      color: var(--accent);
    }

    .ng-copy-hint {
      text-align: center;
      color: #596086;
      font-size: 12px;
      margin-top: 10px;
    }

    .ng-toast {
      position: fixed;
      left: 50%;
      bottom: 185px;
      transform: translateX(-50%);
      padding: 12px 18px;
      background: var(--accent);
      color: #070707;
      border-radius: 999px;
      font-weight: 900;
      display: none;
      z-index: 9999;
    }

    @media(max-width:820px){
      .ng-app {
        padding: 0 12px 28px;
      }

      .ng-layout {
        grid-template-columns: 1fr;
      }

      .ng-sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--border);
        display: flex;
        overflow-x: auto;
        padding: 10px 0;
      }

      .ng-step {
        min-width: 118px;
        border-left: 0;
        border-bottom: 3px solid transparent;
        padding: 0 10px;
      }

      .ng-step.active {
        border-bottom-color: var(--accent);
      }

      .ng-content {
  padding: 22px 24px 40px;
      }

      .ng-prompt-box {
        max-height: 260px;
        overflow: auto;
      }

      .ng-topbar {
        height: auto;
        padding: 14px 0;
      }
    }
  </style>
</head>
<body>

<div class="ng-app">
  <div class="ng-topbar">
    <div class="ng-brand">NeuroGab AI Model Builder</div>
    <button class="ng-reset" onclick="resetBuilder()">Сбросить</button>
  </div>

  <div class="ng-layout">
    <aside class="ng-sidebar" id="sidebar"></aside>
    <main class="ng-content" id="content"></main>
  </div>

  <div class="ng-prompt-wrap">
    <div class="ng-prompt-box" onclick="copyPrompt()">
      <div class="ng-prompt-head">
        <span>Итоговый промпт</span>
        <span class="ng-count" id="count">0 симв.</span>
      </div>
      <div class="ng-prompt-text" id="prompt"></div>
      <div class="ng-copy-hint">Нажмите на промпт, чтобы скопировать</div>
    </div>
  </div>
</div>

<div class="ng-toast" id="toast">Промпт скопирован ✅</div>

<script>

          ['Светлая нейтральная','fair neutral skin, balanced undertones, healthy luminous finish'],
          ['Светлая тёплая','light warm skin, soft golden undertones, healthy luminous finish'],
          ['Оливковая','olive skin, muted warm undertones, smooth luminous finish'],
          ['Средиземноморская','Mediterranean warm skin, golden olive undertones, healthy glow'],
          ['Загорелая','sun-kissed tan skin, warm golden undertones, healthy luminous finish'],
          ['Средняя тёплая','medium warm skin, natural golden undertones, smooth healthy finish'],
          ['Глубокая тёмная','deep dark skin, rich warm undertones, luminous polished finish']
        ]
      }
    ]
  },
  {
    id:'eyes',
    title:'Глаза',
    subtitle:'Цвет и форма',
    groups:[
      {
        title:'Цвет',
        key:'eyeColor',
        options:[
          ['Голубые','blue eyes'],
          ['Серо-голубые','grey-blue eyes'],
          ['Зелёные','green eyes'],
          ['Светло-зелёные','light green eyes'],
          ['Ореховые','hazel eyes'],
          ['Янтарные','amber eyes'],
          ['Светло-карие','light brown eyes'],
          ['Тёмно-карие','dark brown eyes'],
          ['Почти чёрные','almost black eyes']
        ]
      },
      {
        title:'Форма',
        key:'eyeShape',
        options:[
          ['Миндалевидные','almond-shaped eyes'],

          ['Глубоко посаженные','deep-set eyes'],

        ]
      }
    ]
  },
  {
    id:'expression',
    title:'Выражение',
    subtitle:'Эмоция и улыбка',
    groups:[
      {
        title:'Выражение',
        key:'expression',
        options:[
          ['Дружелюбное','warm approachable expression'],
          ['Очень располагающее','very inviting gentle expression'],
          ['Спокойное','calm serene expression'],
          ['Премиальное','expensive composed editorial expression']
        ]
      },
      {
        title:'Улыбка',
        key:'smile',
        options:[
          ['Без улыбки','neutral relaxed mouth'],
          ['Лёгкая закрытая','subtle closed-lip smile'],
          ['Уголками губ','slight smile with the corners of the lips']
        ]
      },
      {

        key:'eyeSmile',

  },
  {
    id:'brows',

    groups:[
      {
        title:'Форма бровей',
        key:'brows',
        options:[
          ['Прямые','straight natural brows'],
          ['С мягкой аркой','soft arched brows'],
          ['Выразительные','expressive defined brows'],

      }
    ]
  },
  {

    subtitle:'Форма носа',
    groups:[

        title:'Форма носа',
        key:'nose',
        options:[
          ['Прямой','straight nose'],
          ['Узкий','narrow refined nose'],
          ['Аккуратный','neat delicate nose'],

    ]
  },
  {
    id:'hair',
    title:'Волосы',
    subtitle:'Цвет, длина, текстура, укладка',
    groups:[
      {
        title:'Цвет',
        key:'hairColor',
        options:[
          ['Платиновый блонд','platinum blonde hair'],
          ['Холодный блонд','cool blonde hair'],
          ['Тёплый блонд','warm blonde hair'],
          ['Тёмный блонд','dark blonde hair'],

          ['Русые','ash brown hair'],
          ['Каштановые','chestnut brown hair'],
          ['Тёмно-каштановые','dark chestnut hair'],
          ['Шоколадные','chocolate brown hair'],
          ['Чёрные','black hair']
        ]
      },
      {
        title:'Длина',
        key:'hairLength',
        options:[
          ['Очень короткие','very short'],
          ['Короткие','short'],
          ['До подбородка','chin-length'],
          ['Каре до плеч','shoulder-length bob'],
          ['До плеч','shoulder-length'],
          ['Ниже плеч','below shoulder length'],
          ['Длинные','long'],
          ['Очень длинные','very long']
        ]
      },
      {
        title:'Текстура',
        key:'hairTexture',
        options:[
          ['Гладкие','smooth'],
          ['Прямые','straight'],
          ['Мягкая волна','soft wavy'],
          ['Объёмные волны','voluminous waves'],
          ['Лёгкие локоны','soft loose curls'],

          ['Афро-кудри','afro curls']

          ['Боковой','side part']

        key:'hairStyle',

          ['Открывают лицо','face-framing styling'],
          ['Не закрывают глаза','not covering the eyes'],
          ['Гладкая','sleek polished styling'],

    ]
  },
  {
    id:'energy',
    title:'Энергетика',
    subtitle:'Общее впечатление',
    groups:[
      {
        title:'Общее впечатление',
        key:'energy',
        options:[
          ['Дружелюбная','friendly approachable energy'],
          ['Дорогая и спокойная','expensive calm energy'],
          ['Яркая запоминающаяся','bright memorable presence'],

          ['Уверенная','confident composed energy'],

const base = {
  gender:'красивой девушки',
  age:'',
  bodyType:'',
  height:'',
  faceShape:'',
  cheekbones:'',
  jawline:'',
  chin:'',
  skin:'',
  eyeColor:'',
  eyeShape:'',
  expression:'',
  smile:'',
  eyeSmile:'',
  brows:'',
  nose:'',
  lips:'',
  hairColor:'',
  hairLength:'',
  hairTexture:'',
  hairPart:'',
  hairStyle:'',
  energy:''
};

let state = {...base};
let activeStep = 'gender';

function renderSidebar() {
  document.getElementById('sidebar').innerHTML = steps.map((s,i)=>{
    const keys = s.groups.map(g=>g.key);
    const done = keys.some(k=>state[k]);

    return `
      <div class="ng-step ${activeStep===s.id?'active':''} ${done?'done':''}" onclick="setStep('${s.id}')">
        <span class="ng-num">${done?'✓':i+1}</span>
        <span>${s.title}</span>
      </div>
    `;
  }).join('');
}

function esc(v) {
  return String(v).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

function renderContent() {
  const step = steps.find(s=>s.id===activeStep);

  document.getElementById('content').innerHTML = `
    <h2>${step.title}</h2>
    <div class="ng-subtitle">${step.subtitle}</div>
    ${step.groups.map(group=>`
      <div class="ng-group">
        <div class="ng-group-title">${group.title}</div>
        <div class="ng-options">
          ${group.options.map(([label,value])=>`
            <button class="ng-option ${state[group.key]===value?'selected':''}" onclick="selectOption('${group.key}','${esc(value)}')">
              ${label}
            </button>
          `).join('')}
        </div>
      </div>
    `).join('')}
  `;
}

function setStep(id) {
  activeStep = id;
  render();
}

function selectOption(key,value) {
  state[key] = value.replace(/&#39;/g,"'").replace(/&quot;/g,'"');
  render();
}

function section(label, arr) {
  const clean = arr.filter(Boolean);
  if (!clean.length) return '';
  return `${label} — <span class="ng-insert">${clean.join(', ')}</span>. `;
}

function rawSection(arr) {
  const clean = arr.filter(Boolean);
  if (!clean.length) return '';
  return `<span class="ng-insert">${clean.join(', ')}</span>. `;
}

function getPromptHTML() {
  const subject = [state.gender,state.age].filter(Boolean).join(' ');
  const body = [state.bodyType,state.height];
  const face = [state.faceShape,state.cheekbones,state.jawline,state.chin];
  const eyes = [state.eyeColor,state.eyeShape];
  const expression = [state.expression,state.smile,state.eyeSmile];
  const hair = [state.hairColor,state.hairLength,state.hairTexture,state.hairPart,state.hairStyle];

  return `
    Ультра-реалистичный студийный beauty-портрет
    <span class="ng-insert">${subject}</span>,
    кадрирование только голова и ключицы, камера на уровне глаз,
    композиция строго по центру, прямой взгляд в объектив,
    глаза — самая резкая точка фокуса.
    Чистый белый бесшовный фон, без реквизита.
    ${rawSection(body)}
    ${rawSection(face)}
    ${section('Кожа',[state.skin])}
    ${section('Глаза',eyes)}
    ${section('Выражение',expression)}
    ${section('Брови',[state.brows])}
    ${section('нос',[state.nose])}
    ${section('губы',[state.lips])}
    ${section('Волосы',hair)}
    Одежда: минималистичный чёрный боди SKIMS на тонких бретелях, без рукавов.
    Свет: мягкий рассеянный студийный, чистые белые, нежные тени,
    естественные тона кожи; премиальный editorial realism —
    аккуратные естественные поры, тонкая текстура кожи,
    реалистичное подповерхностное рассеивание света,
    гладко, но полностью «живое», без пластикового эффекта.
    ${section('Общее впечатление',[state.energy])}
  `;
}

function getPromptText() {
  const div = document.createElement('div');
  div.innerHTML = getPromptHTML();
  return div.textContent.replace(/\s+/g,' ').trim();
}

function renderPrompt() {
  const html = getPromptHTML();
  const text = getPromptText();

  document.getElementById('prompt').innerHTML = html;
  document.getElementById('count').textContent = text.length + ' симв.';
}

function resetBuilder() {
  state = {...base};
  activeStep = 'gender';
  render();
}

function copyPrompt() {
  navigator.clipboard.writeText(getPromptText()).then(()=>{
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(()=>toast.style.display='none',1400);
  });
}

function render() {
  renderSidebar();
  renderContent();
  renderPrompt();
}

render();
</script>

</body>
</html>
